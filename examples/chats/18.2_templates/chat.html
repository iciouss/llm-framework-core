<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #21262d;
    --muted:    #8b949e;
    --text:     #e6edf3;
    --user-bg:  #1f6feb;
    --user-txt: #ffffff;
    --agent-bg: #21262d;
    --agent-txt:#e6edf3;
    --accent:   #388bfd;
    --danger:   #f85149;
    --warn:     #d29922;
    --green:    #3fb950;
    --radius:   16px;
  }

  html, body { height: 100%; }
  html { overflow-x: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  .header-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6e40c9, var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .header-info { flex: 1; min-width: 0; }
  .header-name { font-size: 15px; font-weight: 600; }
  .header-status { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .user-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
  }
  .role-tag {
    font-size: 10.5px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .4px;
    flex-shrink: 0;
  }
  .role-admin    { background: #1e1e0e; color: var(--warn);  border: 1px solid #d2992233; }
  .role-analyst  { background: #0d1f36; color: #58a6ff;      border: 1px solid #388bfd33; }
  .role-viewer   { background: #0e1e0e; color: var(--green); border: 1px solid #3fb95033; }
  .role-unknown  { background: var(--border); color: var(--muted); border: 1px solid transparent; }
  .header-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
    font-family: inherit;
  }
  .header-btn:hover { background: var(--border); color: var(--text); border-color: var(--muted); }
  .header-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: transparent; }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 18px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Bubble rows ── */
  .bubble-row {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    min-width: 0;
    gap: 3px;
  }
  .bubble-row.user  { align-self: flex-end;   align-items: flex-end; }
  .bubble-row.agent { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .bubble.user {
    background: var(--user-bg);
    color: var(--user-txt);
    border-bottom-right-radius: 4px;
  }
  .bubble.agent {
    background: var(--agent-bg);
    color: var(--agent-txt);
    border-bottom-left-radius: 4px;
    overflow: hidden;
    max-width: 100%;
  }
  .sys-row { align-self: center; max-width: 90%; }
  .bubble.system {
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    padding: 4px 8px;
  }
  .bubble.blocked {
    background: #1e0e0e;
    border: 1px solid #f8514933;
    color: var(--danger);
    font-size: 13px;
    border-radius: 10px;
    text-align: center;
    padding: 8px 14px;
  }

  /* ── Token badge ── */
  .token-badge { font-size: 11px; color: #484f58; padding: 0 4px; margin-top: 1px; }

  /* ── Step cards ── */
  .steps-wrap {
    align-self: flex-start;
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 88%;
    width: 100%;
  }
  .step-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    font-size: 12.5px;
  }
  .step-card-header {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 10px;
    cursor: pointer; user-select: none;
    color: var(--muted);
  }
  .step-card-header:hover { background: var(--border); }
  .step-card-label { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .step-card-chevron { font-size: 10px; color: #484f58; transition: transform .2s; flex-shrink: 0; }
  .step-card.open .step-card-chevron { transform: rotate(180deg); }
  .step-card-body {
    display: none;
    padding: 6px 10px 8px;
    color: #8b949e;
    border-top: 1px solid var(--border);
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 11.5px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 180px;
    overflow-y: auto;
  }
  .step-card.open .step-card-body { display: block; }
  .step-thought .step-card-header { border-left: 2px solid #484f58; }
  .step-action  .step-card-header { border-left: 2px solid var(--accent); }
  .step-obs     .step-card-header { border-left: 2px solid var(--green); }
  .step-err     .step-card-header { border-left: 2px solid var(--danger); }

  /* ── Typing dots ── */
  .typing-row { align-self: flex-start; }
  .typing-bubble {
    background: var(--agent-bg);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    padding: 12px 16px;
    display: flex; gap: 5px; align-items: center;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .35; }
    30%            { transform: translateY(-5px); opacity: 1; }
  }

  /* ── Info cards (tools / help) ── */
  .info-card {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    max-width: 92%;
    font-size: 13.5px;
  }
  .info-card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .tool-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .tool-item:last-child { border-bottom: none; }
  .tool-name  { font-size: 13px; font-weight: 500; color: var(--accent); white-space: nowrap; }
  .tool-right { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .tool-desc  { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tag-row    { display: flex; gap: 4px; margin-top: 2px; }
  .tag        { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
  .tag-approval { background: #2d1f00; color: var(--warn); }
  .help-grid  { display: grid; grid-template-columns: auto 1fr; gap: 5px 14px; }
  .help-cmd   { color: var(--accent); font-family: monospace; font-size: 13px; }
  .help-desc  { font-size: 13px; color: var(--muted); }

  /* ── Input area ── */
  .input-area {
    display: flex; align-items: flex-end; gap: 8px;
    padding: 12px 18px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    display: flex; align-items: flex-end;
    padding: 10px 16px;
    transition: border-color .15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }
  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    resize: none; font-size: 14.5px; color: var(--text);
    font-family: inherit; line-height: 1.45;
    max-height: 120px; overflow-y: auto;
  }
  textarea::placeholder { color: #484f58; }
  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--accent);
    border: none; color: #fff; font-size: 17px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity .15s, transform .1s; line-height: 1;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:active { transform: scale(.9); }
  .send-btn:disabled { background: var(--border); color: #484f58; cursor: not-allowed; }

  /* ── Approval modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.65); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 22px 20px 16px;
    width: min(380px, 94vw); box-shadow: 0 24px 64px rgba(0,0,0,.6);
  }
  .modal-icon  { font-size: 28px; text-align: center; margin-bottom: 6px; }
  .modal-title { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 3px; }
  .modal-tool  { font-size: 13px; color: var(--accent); font-weight: 600; text-align: center; margin-bottom: 10px; }
  .modal-args {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px;
    font-family: "SF Mono", "Fira Code", monospace; font-size: 12px;
    color: var(--muted); max-height: 110px; overflow-y: auto;
    margin-bottom: 16px; word-break: break-all; white-space: pre-wrap;
  }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 11px; border: none; border-radius: 10px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
  }
  .modal-btn:hover { opacity: .85; }
  .modal-btn.deny  { background: var(--border); color: var(--danger); }
  .modal-btn.allow { background: var(--accent); color: #fff; }

  /* ── Markdown ── */
  .bubble.agent { white-space: normal; }
  .md-body { line-height: 1.6; }
  .md-body p { margin: 0 0 8px; }
  .md-body p:last-child { margin-bottom: 0; }
  .md-body h1,.md-body h2,.md-body h3 { font-weight: 600; margin: 12px 0 6px; line-height: 1.3; }
  .md-body h1 { font-size: 1.3em; } .md-body h2 { font-size: 1.15em; } .md-body h3 { font-size: 1.05em; }
  .md-body ul,.md-body ol { padding-left: 20px; margin: 4px 0 8px; }
  .md-body li { margin: 3px 0; }
  .md-body code {
    background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    padding: 1px 5px; font-family: "SF Mono", "Fira Code", monospace;
    font-size: .87em; color: #e6edf3;
  }
  .md-body pre {
    background: #0d1117; border: 1px solid #30363d; border-radius: 8px;
    padding: 11px 14px; overflow-x: auto; margin: 8px 0;
  }
  .md-body pre code { background: none; border: none; padding: 0; font-size: .85em; }
  .md-body blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; margin: 8px 0; }
  .table-wrap { overflow-x: auto; margin: 8px 0; width: 100%; max-width: 100%; }
  .md-body table { border-collapse: collapse; font-size: 13px; }
  .table-wrap .md-body table { margin: 0; }
  .md-body th,.md-body td { border: 1px solid #30363d; padding: 6px 10px; text-align: left; white-space: nowrap; }
  .md-body th { background: #161b22; font-weight: 600; }
  .md-body tr:nth-child(even) td { background: #161b2218; }
  .md-body a { color: #388bfd; text-decoration: none; }
  .md-body a:hover { text-decoration: underline; }
  .md-body hr { border: none; border-top: 1px solid #30363d; margin: 10px 0; }
  .md-body strong { font-weight: 600; }
  .md-body em { font-style: italic; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-avatar">&#x1F916;</div>
  <div class="header-info">
    <div class="header-name">Chat Agent</div>
    <div class="header-status" id="headerStatus">Connecting&hellip;</div>
  </div>
  <div class="header-right">
    <span class="user-badge" id="userBadge">&#x2026;</span>
    <span class="role-tag role-unknown" id="roleTag">&#x2026;</span>
    <button class="header-btn" id="btnTools">&#x2699; Tools</button>
    <button class="header-btn danger" id="btnClear">&#x21BA; Clear</button>
    <form action="/auth/logout" method="POST" style="display:contents">
      <button class="header-btn danger" type="submit">Sign out</button>
    </form>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages"></div>

<!-- Input -->
<div class="input-area">
  <div class="input-wrap">
    <textarea id="inputBox" placeholder="Message&hellip; (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" disabled title="Send">&#x2191;</button>
</div>

<!-- Approval modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon">&#x26A0;&#xFE0F;</div>
    <div class="modal-title">Approval Required</div>
    <div class="modal-tool" id="modalTool"></div>
    <div class="modal-args" id="modalArgs"></div>
    <div class="modal-btns">
      <button class="modal-btn deny"  id="btnDeny">Deny</button>
      <button class="modal-btn allow" id="btnAllow">Allow</button>
    </div>
  </div>
</div>

<script>
// ── markdown ────────────────────────────────────────────────────────────────
function renderMarkdown(text) {
  let html = marked.parse(text);
  html = html.replace(/<table>/g, '<div class="table-wrap"><table>')
             .replace(/<\/table>/g, '</table></div>');
  return html;
}

// ── refs ───────────────────────────────────────────────────────────────────
const msgs      = document.getElementById('messages');
const inputBox  = document.getElementById('inputBox');
const sendBtn   = document.getElementById('sendBtn');
const btnTools  = document.getElementById('btnTools');
const btnClear  = document.getElementById('btnClear');
const overlay   = document.getElementById('modalOverlay');
const modalTool = document.getElementById('modalTool');
const modalArgs = document.getElementById('modalArgs');
const btnAllow  = document.getElementById('btnAllow');
const btnDeny   = document.getElementById('btnDeny');
const statusEl  = document.getElementById('headerStatus');
const userBadge = document.getElementById('userBadge');
const roleTag   = document.getElementById('roleTag');

// ── state ──────────────────────────────────────────────────────────────────
let ws = null;
let busy = false;
let currentStepsWrap = null;
let typingEl = null;

// ── helpers ────────────────────────────────────────────────────────────────
function scrollBottom() { msgs.scrollTop = msgs.scrollHeight; }

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

inputBox.addEventListener('input', () => {
  inputBox.style.height = 'auto';
  inputBox.style.height = Math.min(inputBox.scrollHeight, 120) + 'px';
});

// ── user info ──────────────────────────────────────────────────────────────
async function fetchMe() {
  try {
    const res = await fetch('/api/me');
    if (!res.ok) { location.href = '/login'; return; }
    const me = await res.json();
    const role = (me.roles || [])[0] || 'unknown';
    userBadge.textContent = me.user_id;
    roleTag.textContent = role;
    roleTag.className = `role-tag role-${role}`;
  } catch (_) {
    location.href = '/login';
  }
}
fetchMe();

// ── bubbles ────────────────────────────────────────────────────────────────
function addBubble(text, side) {
  const row = document.createElement('div');
  row.className = `bubble-row ${side}`;
  const b = document.createElement('div');
  b.className = `bubble ${side}`;
  if (side === 'agent' && typeof marked !== 'undefined') {
    const wrap = document.createElement('div');
    wrap.className = 'md-body';
    wrap.innerHTML = renderMarkdown(text);
    b.appendChild(wrap);
  } else {
    b.textContent = text;
  }
  row.appendChild(b);
  msgs.appendChild(row);
  scrollBottom();
  return row;
}

function addSysMsg(text, cls = 'system') {
  const row = document.createElement('div');
  row.className = 'sys-row';
  const b = document.createElement('div');
  b.className = `bubble ${cls}`;
  b.textContent = text;
  row.appendChild(b);
  msgs.appendChild(row);
  scrollBottom();
}

// ── typing ─────────────────────────────────────────────────────────────────
function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'typing-row';
  typingEl.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(typingEl);
  scrollBottom();
}
function hideTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

// ── step cards ─────────────────────────────────────────────────────────────
function ensureSteps() {
  if (!currentStepsWrap) {
    currentStepsWrap = document.createElement('div');
    currentStepsWrap.className = 'steps-wrap';
    msgs.appendChild(currentStepsWrap);
  }
  return currentStepsWrap;
}

function addStepCard(cls, icon, label, body) {
  hideTyping();
  const wrap = ensureSteps();
  const card = document.createElement('div');
  card.className = `step-card ${cls}`;
  card.innerHTML =
    `<div class="step-card-header">` +
      `<span>${icon}</span>` +
      `<span class="step-card-label">${esc(label)}</span>` +
      `<span class="step-card-chevron">&#x25BE;</span>` +
    `</div>` +
    `<div class="step-card-body">${esc(body)}</div>`;
  card.querySelector('.step-card-header').addEventListener('click', () => {
    card.classList.toggle('open');
    scrollBottom();
  });
  wrap.appendChild(card);
  showTyping();
  scrollBottom();
}

// ── tools card ─────────────────────────────────────────────────────────────
function renderTools(tools) {
  const card = document.createElement('div');
  card.className = 'info-card';
  let html = `<div class="info-card-title">Available tools</div>`;
  for (const t of tools) {
    const tags = t.requires_approval
      ? `<div class="tag-row"><span class="tag tag-approval">approval</span></div>` : '';
    html += `<div class="tool-item">
      <div class="tool-name">${esc(t.name)}</div>
      <div class="tool-right">
        <div class="tool-desc">${esc(t.description)}</div>
        ${tags}
      </div>
    </div>`;
  }
  card.innerHTML = html;
  msgs.appendChild(card);
  scrollBottom();
}

// ── help card ──────────────────────────────────────────────────────────────
function renderHelp() {
  const card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = `<div class="info-card-title">Commands</div>
    <div class="help-grid">
      <span class="help-cmd">/tools</span><span class="help-desc">List your available tools</span>
      <span class="help-cmd">/clear</span><span class="help-desc">Clear conversation history</span>
      <span class="help-cmd">/help</span> <span class="help-desc">Show this message</span>
      <span class="help-cmd">/quit</span> <span class="help-desc">Disconnect</span>
    </div>`;
  msgs.appendChild(card);
  scrollBottom();
}

// ── token badge ────────────────────────────────────────────────────────────
function addTokenBadge(row, ctx, prompt, completion, reasoning) {
  const gen = completion - reasoning;
  const badge = document.createElement('div');
  badge.className = 'token-badge';
  badge.textContent = `ctx ${ctx} \xB7 in ${prompt} \xB7 out ${gen}` +
    (reasoning ? ` \xB7 reason ${reasoning}` : '');
  row.appendChild(badge);
}

// ── busy ───────────────────────────────────────────────────────────────────
function setBusy(val) {
  busy = val;
  sendBtn.disabled = val;
  statusEl.textContent = val ? 'Thinking\u2026' : 'Online';
}

// ── send ───────────────────────────────────────────────────────────────────
function sendMessage() {
  if (busy) return;
  const text = inputBox.value.trim();
  if (!text) return;
  const cmd = text.toLowerCase();

  if (cmd === '/help')  { inputBox.value = ''; inputBox.style.height = 'auto'; renderHelp(); return; }
  if (cmd === '/tools') { inputBox.value = ''; inputBox.style.height = 'auto'; wsSend({ type: 'tools' }); return; }
  if (cmd === '/clear') { inputBox.value = ''; inputBox.style.height = 'auto'; wsSend({ type: 'clear' }); return; }

  addBubble(text, 'user');
  inputBox.value = '';
  inputBox.style.height = 'auto';
  setBusy(true);
  currentStepsWrap = null;
  wsSend({ type: 'message', text });
}

sendBtn.addEventListener('click', sendMessage);
inputBox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
btnClear.addEventListener('click', () => wsSend({ type: 'clear' }));
btnTools.addEventListener('click', () => wsSend({ type: 'tools' }));

// ── approval modal ─────────────────────────────────────────────────────────
function showApproval(tool, args) {
  modalTool.textContent = tool;
  modalArgs.textContent = JSON.stringify(args, null, 2);
  overlay.classList.add('visible');
}
function hideApproval() { overlay.classList.remove('visible'); }

btnAllow.addEventListener('click', () => { hideApproval(); wsSend({ type: 'approval', approved: true  }); });
btnDeny.addEventListener('click',  () => { hideApproval(); wsSend({ type: 'approval', approved: false }); });

// ── arg formatter ──────────────────────────────────────────────────────────
function fmtArgs(args) {
  return Object.entries(args).map(([k, v]) => {
    let s = JSON.stringify(v);
    if (s.length > 45) s = s.slice(0, 42) + '\u2026';
    return `${k}=${s}`;
  }).join(', ');
}

// ── WebSocket ──────────────────────────────────────────────────────────────
function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => { statusEl.textContent = 'Online'; sendBtn.disabled = false; };
  ws.onclose = () => {
    statusEl.textContent = 'Reconnecting\u2026';
    sendBtn.disabled = true;
    setBusy(false);
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();

  ws.onmessage = ev => {
    const msg = JSON.parse(ev.data);

    switch (msg.type) {
      case 'auth_error':
        location.href = '/login';
        break;

      case 'thinking':
        showTyping();
        break;

      case 'event': {
        switch (msg.event) {
          case 'thought': {
            const content = (msg.content || '').trim();
            if (!content) break;
            const label = msg.kind === 'plan' ? 'Plan' : 'Thinking';
            const icon  = msg.kind === 'plan' ? '\u25B8' : '\u25E6';
            addStepCard('step-thought', icon, label, content);
            break;
          }
          case 'action':
            addStepCard('step-action', '\u2192',
              `${msg.tool}(${fmtArgs(msg.args || {})})`,
              JSON.stringify(msg.args || {}, null, 2));
            break;
          case 'observation': {
            const content = String(msg.content || '');
            const preview = content.length > 60 ? content.slice(0, 60) + '\u2026' : content;
            addStepCard('step-obs', '\u2190', preview, content);
            break;
          }
          case 'tool_error':
            addStepCard('step-err', '\u2717', `${msg.tool}: ${msg.error}`, msg.error || '');
            break;
          case 'error':
            addSysMsg(`Error: ${msg.reason || 'Max steps reached'}`);
            break;
        }
        break;
      }

      case 'done': {
        hideTyping();
        currentStepsWrap = null;
        const row = addBubble(msg.answer || '(no answer)', 'agent');
        addTokenBadge(row, msg.context_tokens, msg.prompt_tokens,
                      msg.completion_tokens, msg.reasoning_tokens);
        setBusy(false);
        break;
      }

      case 'blocked':
        hideTyping();
        currentStepsWrap = null;
        addSysMsg(`Blocked: ${msg.reason}`, 'blocked');
        setBusy(false);
        break;

      case 'cleared':
        addSysMsg('History cleared.');
        break;

      case 'tools':
        renderTools(msg.tools || []);
        break;

      case 'help':
        renderHelp();
        break;

      case 'unknown_command':
        addSysMsg(`Unknown command: ${msg.command}`);
        break;

      case 'approval_request':
        showApproval(msg.tool, msg.args || {});
        break;

      case 'quit':
        ws.close();
        addSysMsg('Disconnected.');
        break;
    }
  };
}

connect();
</script>
