<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — Chat Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #21262d;
    --muted:   #8b949e;
    --text:    #e6edf3;
    --accent:  #388bfd;
    --danger:  #f85149;
    --radius:  16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 32px 28px;
    width: min(360px, 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar {
    width: 54px; height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6e40c9, var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin-bottom: 16px;
  }

  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }

  .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 24px; }

  .error-msg {
    display: none;
    width: 100%;
    background: #1e0e0e;
    border: 1px solid #f8514933;
    color: var(--danger);
    font-size: 13px;
    border-radius: 10px;
    padding: 9px 14px;
    text-align: center;
    margin-bottom: 14px;
  }

  form { width: 100%; display: flex; flex-direction: column; gap: 10px; }

  .sso-btn {
    display: block;
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    margin-top: 4px;
    font-family: inherit;
    text-align: center;
    text-decoration: none;
    transition: opacity .15s;
  }
  .sso-btn:hover  { opacity: .85; }
  .sso-btn:active { opacity: .7; }

  .info {
    margin-top: 20px;
    width: 100%;
    font-size: 12.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="avatar">&#x1F916;</div>
  <h1>Chat Agent</h1>
  <p class="subtitle">Sign in to continue</p>
  <div class="error-msg" id="errMsg">Authentication failed. Contact your administrator.</div>
  <a href="/auth/initiate" class="sso-btn">Sign in with SSO</a>
  <p class="info">You will be redirected to your identity provider.</p>
</div>
<script>
  const p = new URLSearchParams(location.search);
  if (p.get('error') === 'unauthorized') {
    document.getElementById('errMsg').textContent =
      'Your account is not authorised to access this application.';
    document.getElementById('errMsg').style.display = 'block';
  } else if (p.get('error')) {
    document.getElementById('errMsg').style.display = 'block';
  }
</script>
</body>
</html>
