<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — Chat Agent</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #21262d;
            --muted: #8b949e;
            --text: #e6edf3;
            --accent: #388bfd;
            --danger: #f85149;
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px 28px;
            width: min(360px, 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6e40c9, var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .error-msg {
            display: none;
            width: 100%;
            background: #1e0e0e;
            border: 1px solid #f8514933;
            color: var(--danger);
            font-size: 13px;
            border-radius: 10px;
            padding: 9px 14px;
            text-align: center;
            margin-bottom: 14px;
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 14px;
            color: var(--text);
            font-family: inherit;
            outline: none;
            transition: border-color .15s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: #484f58;
        }

        .submit-btn {
            width: 100%;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            padding: 12px;
            cursor: pointer;
            margin-top: 4px;
            font-family: inherit;
            transition: opacity .15s;
        }

        .submit-btn:hover {
            opacity: .85;
        }

        .submit-btn:active {
            opacity: .7;
        }

        .hint {
            margin-top: 22px;
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .hint-title {
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: #484f58;
            margin-bottom: 8px;
        }

        .hint-grid {
            display: grid;
            grid-template-columns: auto auto 1fr;
            gap: 4px 10px;
            align-items: baseline;
        }

        .hint-cred {
            color: var(--accent);
            font-family: monospace;
            font-size: 12.5px;
        }

        .hint-arrow {
            color: #484f58;
            font-size: 12px;
        }

        .hint-role {
            color: var(--muted);
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="avatar">&#x1F916;</div>
        <h1>Chat Agent</h1>
        <p class="subtitle">Sign in to continue</p>
        <div class="error-msg" id="errMsg">Invalid username or password.</div>
        <form action="/auth/login" method="POST">
            <input name="username" placeholder="Username" autocomplete="username" required autofocus />
            <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
            <button class="submit-btn" type="submit">Sign in</button>
        </form>
        <div class="hint">
            <div class="hint-title">Demo accounts</div>
            <div class="hint-grid">
                <span class="hint-cred">admin / admin123</span>
                <span class="hint-arrow">&#x2192;</span>
                <span class="hint-role">all tools</span>
                <span class="hint-cred">alice / analyst456</span>
                <span class="hint-arrow">&#x2192;</span>
                <span class="hint-role">web + filesystem + clock</span>
                <span class="hint-cred">bob / viewer789</span>
                <span class="hint-arrow">&#x2192;</span>
                <span class="hint-role">clock only</span>
            </div>
        </div>
    </div>
    <script>
        if (new URLSearchParams(location.search).get('error')) {
            document.getElementById('errMsg').style.display = 'block';
        }
    </script>
</body>

</html>
