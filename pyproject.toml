[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "llm-framework"
dynamic = ["version"]
description = "Minimal Python library for building LLM-powered agents with a low dependency footprint."
readme = "README.md"
license = "MIT"
requires-python = ">=3.13"
dependencies = ["httpx>=0.28.1", "python-dotenv>=1.2.2"]

[project.optional-dependencies]
mcp = []
rag = ["markitdown>=0.1.5", "semantic-text-splitter>=0.30.1"]
qdrant = ["qdrant-client>=1.17.1"]
oidc = ["PyJWT[crypto]>=2.9.0"]
web = ["fastapi>=0.115.0", "uvicorn>=0.34.0", "websockets>=13.0"]
all = ["llm-framework[rag,qdrant,web,oidc]"]

[dependency-groups]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-llmstxt>=0.5.0",
    "mkdocs-macros-plugin>=1.5.0",
    "mkdocs-material>=9.7.6",
    "mkdocstrings[python]>=1.0.4",
]

[project.scripts]
knowledge-server = "llm_framework.mcp_servers.knowledge_server:main"
memory-server = "llm_framework.mcp_servers.memory_server:main"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["llm_framework"]
