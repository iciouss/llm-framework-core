[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "llm-framework"
dynamic = ["version"]
description = "Minimal Python library for building LLM-powered agents with a low dependency footprint."
readme = "README.md"
license = "MIT"
requires-python = ">=3.13"
dependencies = ["httpx>=0.28.1", "python-dotenv>=1.2.2"]

[project.optional-dependencies]
# Library extras — extend the core library; install only what you need
rag = ["pypdf>=6.12.2", "semantic-text-splitter>=0.30.1"]
qdrant = ["qdrant-client>=1.17.1"]
oidc = ["PyJWT[crypto]>=2.9.0"]
# Convenience groups
all = ["llm-framework[rag,qdrant,oidc]"]

[dependency-groups]
# core  — base install only (httpx + python-dotenv); uv sync --group core
core = []
# extra — all library extensions; uv sync --group extra
extra = ["llm-framework[all]"]
# examples — library extensions + web; install before running any example
examples = [
    "fastapi>=0.136.1",
    "llm-framework[all]",
    "uvicorn>=0.46.0",
    "websockets>=16.0",
]
docs = [
    "mkdocs>=1.6.1",
    "mkdocs-llmstxt>=0.5.0",
    "mkdocs-macros-plugin>=1.5.0",
    "mkdocs-material>=9.7.6",
    "mkdocstrings[python]>=1.0.4",
]

[project.scripts]
knowledge-server = "llm_framework.mcp_servers.knowledge_server:main"
memory-server = "llm_framework.mcp_servers.memory_server:main"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.wheel]
packages = ["llm_framework"]
