name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # fetch-depth: 0 is required for gitleaks to scan the commit range;
        # the default shallow clone omits the merge commit's parents.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        # gitleaks scans full history; fail fast on leaked credentials before any install
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        # --all-extras covers the whole test surface (mcp, rag, oidc); --group dev adds lint/types/coverage
        run: uv sync --all-extras --group dev

      - name: Lint with ruff
        run: uv run ruff check llm_framework tests

      - name: Scan with bandit
        # Default thresholds: review flagged 6 low-confidence findings as informational, none medium/high
        run: uv run bandit -r llm_framework

      # - name: Type-check with mypy
      #   run: uv run mypy llm_framework

      # - name: Check dependencies with deptry
      #   # Scoped to library + tests; examples/ and docs/ have their own dep trees
      #   run: uv run deptry llm_framework tests

      - name: Run unit tests
        # unit + packaging only; integration tests need a live LLM endpoint and are run on demand
        run: uv run pytest tests/unit tests/test_packaging.py --cov=llm_framework --cov-report=term-missing
