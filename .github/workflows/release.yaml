name: Publish to GitHub Releases

on:
  push:
    tags:
      - "v*"
  repository_dispatch:
    types: [release]

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve version
        # Pick up the version from whichever trigger fired this workflow.
        # repository_dispatch carries it in client_payload; tag pushes use the tag name.
        id: version
        run: |
          v="${{ github.event.client_payload.version }}"
          if [ -z "$v" ]; then v="${{ github.ref_name }}"; fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        # fetch-depth: 0 is important for hatch-vcs to read the git tags correctly
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Build package
        run: uv build

      - name: Create GitHub Release
        env:
          # gh reads GH_TOKEN. On manual tag pushes github.ref_name is the
          # tag; on repository_dispatch it's "main", so the Resolve version
          # step above provides the correct value via the env-passed output.
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            dist/*.whl dist/*.tar.gz \
            --title "Release ${{ steps.version.outputs.version }}" \
            --generate-notes
