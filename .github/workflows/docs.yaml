name: Deploy Documentation

on:
  push:
    branches:
      - main
    # This prevents the workflow from running if you only edit code that doesn't affect docs
    # paths:
    #   - "docs/**"
    #   - "*.md"
    #   - "mkdocs.yml"
    #   - "llm_framework/**"
    #   - "pyproject.toml"
    #   - ".env.example"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --group docs

      - name: Deploy MkDocs
        run: uv run mkdocs gh-deploy --force
